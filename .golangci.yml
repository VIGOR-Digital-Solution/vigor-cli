# Inherits intent from tools/golangci/golangci.yaml in vigor-boilerplate.
# Pinned-down copy because golangci-lint can't extend across repos without a URL.
run:
  timeout: 5m
  go: "1.23"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - typecheck
    - unused
    - gofmt
    - goimports
    - gosimple
    - misspell
    - revive
    - whitespace
    - errorlint
    - wrapcheck
    - bodyclose
    - contextcheck
    - noctx
    - gosec
    - unconvert
    - gocritic
    - nilerr

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gosec, wrapcheck]
    - path: cmd/.*main\.go
      linters: [wrapcheck]
